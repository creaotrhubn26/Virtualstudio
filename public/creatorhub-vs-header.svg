<?xml version="1.0" encoding="UTF-8"?>
<svg width="180" height="36" viewBox="0 0 180 36" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  
  <!-- Compact Icon: 3D Viewport with Camera -->
  <g transform="translate(2, 3)">
    <!-- Viewport frame -->
    <rect x="2" y="2" width="26" height="20" rx="2" fill="#1a1a2e" stroke="url(#amberGrad)" stroke-width="1.5"/>
    <!-- 3D depth hint -->
    <path d="M2 2 L0 0 M28 2 L30 0 M28 22 L30 24 M2 22 L0 24" stroke="url(#amberGrad)" stroke-width="1" opacity="0.6"/>
    <!-- Top accent bar -->
    <rect x="2" y="2" width="26" height="4" rx="2" fill="url(#amberGrad)" opacity="0.3"/>
    <!-- Camera lens -->
    <circle cx="15" cy="14" r="5" fill="#0e7490" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="15" cy="14" r="2" fill="#00d4ff"/>
    <!-- Recording dot -->
    <circle cx="24" cy="6" r="1.5" fill="#ef4444"/>
  </g>
  
  <!-- Text: CreatorHub -->
  <text x="36" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="url(#amberGrad)">
    CREATORHUB
  </text>
  
  <!-- Text: Virtual Studio -->
  <text x="36" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="url(#cyanGrad)">
    VIRTUAL STUDIO
  </text>
</svg>

