<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="amber64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="cyan64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="shadow64">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#amber64)" stroke-width="2"/>
  
  <!-- 3D Viewport -->
  <g transform="translate(12, 14)" filter="url(#shadow64)">
    <!-- Main frame -->
    <rect x="4" y="4" width="32" height="24" rx="3" fill="#1e293b" stroke="url(#amber64)" stroke-width="2"/>
    <!-- 3D depth -->
    <path d="M4 4 L0 0 L0 32 L4 28 M36 4 L40 0 L40 32 L36 28" fill="none" stroke="url(#amber64)" stroke-width="1.5" opacity="0.5"/>
    <!-- Top bar -->
    <rect x="4" y="4" width="32" height="6" rx="3" fill="url(#amber64)" opacity="0.25"/>
  </g>
  
  <!-- Camera -->
  <g transform="translate(22, 26)">
    <rect x="0" y="2" width="20" height="12" rx="2" fill="url(#cyan64)"/>
    <circle cx="10" cy="8" r="4" fill="#0e7490" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="10" cy="8" r="2" fill="#00d4ff"/>
    <circle cx="10" cy="8" r="0.5" fill="#fff"/>
    <!-- Recording dot -->
    <circle cx="17" cy="4" r="1.5" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Light rays -->
  <g stroke="url(#cyan64)" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="42" y1="34" x2="52" y2="30"/>
    <line x1="42" y1="34" x2="54" y2="36"/>
    <line x1="42" y1="34" x2="52" y2="42"/>
  </g>
</svg>

