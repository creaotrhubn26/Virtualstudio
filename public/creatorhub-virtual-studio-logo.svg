<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- CreatorHub Norge Amber-Orange Gradient (matcher original) -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cyan accent for Virtual Studio -->
    <linearGradient id="studioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Virtual Studio Icon -->
  <g transform="translate(25, 12)">
    <!-- 3D Studio Viewport Frame -->
    <g filter="url(#dropShadow)">
      <!-- Main viewport rectangle -->
      <rect x="10" y="15" width="50" height="40" rx="3" 
            fill="#1a1a2e" stroke="url(#logoGradient)" stroke-width="2.5"/>
      
      <!-- 3D perspective corners -->
      <path d="M10 15 L2 8 L2 62 L10 55" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
      <path d="M60 15 L68 8 L68 62 L60 55" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
      <path d="M2 8 L10 15 M68 8 L60 15" stroke="url(#logoGradient)" stroke-width="2"/>
      
      <!-- Top frame accent -->
      <rect x="10" y="15" width="50" height="8" rx="3" fill="url(#logoGradient)" opacity="0.3"/>
    </g>
    
    <!-- Camera inside viewport -->
    <g transform="translate(22, 32)" filter="url(#glow)">
      <!-- Camera body -->
      <rect x="0" y="2" width="26" height="16" rx="3" fill="url(#studioGradient)"/>
      <!-- Lens housing -->
      <circle cx="13" cy="10" r="6" fill="#0e7490" stroke="#00d4ff" stroke-width="1.5"/>
      <!-- Lens inner -->
      <circle cx="13" cy="10" r="3" fill="#00d4ff"/>
      <circle cx="13" cy="10" r="1" fill="#ffffff"/>
      <!-- Recording dot -->
      <circle cx="23" cy="5" r="2" fill="#ef4444">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Viewfinder -->
      <rect x="20" y="0" width="6" height="4" rx="1" fill="#0891b2"/>
    </g>
    
    <!-- Light rays -->
    <g opacity="0.5" stroke="url(#studioGradient)" stroke-width="1.5" stroke-linecap="round">
      <line x1="48" y1="42" x2="62" y2="38"/>
      <line x1="48" y1="42" x2="64" y2="44"/>
      <line x1="48" y1="42" x2="62" y2="50"/>
    </g>
    
    <!-- Person silhouette -->
    <g transform="translate(12, 28)" opacity="0.6">
      <circle cx="6" cy="6" r="4" fill="url(#logoGradient)"/>
      <path d="M0 22 C0 14 12 14 12 22" fill="url(#logoGradient)"/>
    </g>
  </g>
  
  <!-- CreatorHub Text -->
  <text x="100" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700" 
        fill="url(#logoGradient)" filter="url(#dropShadow)">CREATORHUB</text>
  
  <!-- Virtual Studio Subtitle -->
  <text x="100" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" 
        fill="url(#studioGradient)">VIRTUAL STUDIO</text>
        
  <!-- Tagline -->
  <text x="100" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="400" 
        fill="#b45309" opacity="0.8">3D Fotostudio Simulator • Norge</text>
        
  <!-- Version badge -->
  <g transform="translate(320, 65)">
    <rect x="0" y="0" width="45" height="18" rx="9" fill="url(#studioGradient)" opacity="0.15"/>
    <rect x="0" y="0" width="45" height="18" rx="9" fill="none" stroke="url(#studioGradient)" stroke-width="1" opacity="0.4"/>
    <text x="22.5" y="12.5" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" 
          fill="#00d4ff" text-anchor="middle">BETA</text>
  </g>
</svg>

