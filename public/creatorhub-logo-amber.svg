<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- CreatorHub Norge Amber-Orange Gradient -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Creative Tools Icon -->
  <g transform="translate(40, 20)">
    <!-- Central Pencil -->
    <path d="M20 10 L20 50 L15 55 L10 50 L10 45 L5 45 L5 15 L10 10 Z" 
          fill="url(#logoGradient)" 
          filter="url(#dropShadow)"/>
    
    <!-- Pencil Tip -->
    <polygon points="10,10 15,5 20,10" fill="#d97706"/>
    
    <!-- Creative Tools Arms -->
    <!-- Top Right - Camera -->
    <circle cx="35" cy="15" r="6" fill="url(#logoGradient)"/>
    <rect x="32" y="12" width="6" height="6" rx="1" fill="#ffffff"/>
    <line x1="20" y1="20" x2="29" y2="15" stroke="url(#logoGradient)" stroke-width="3"/>
    
    <!-- Top Left - Video -->
    <polygon points="5,15 -5,10 -5,20" fill="url(#logoGradient)"/>
    <line x1="20" y1="20" x2="5" y2="15" stroke="url(#logoGradient)" stroke-width="3"/>
    
    <!-- Bottom Right - Music Note -->
    <circle cx="35" cy="45" r="4" fill="url(#logoGradient)"/>
    <rect x="35" y="35" width="2" height="10" fill="url(#logoGradient)"/>
    <path d="M37 35 Q42 33 42 38" stroke="url(#logoGradient)" stroke-width="2" fill="none"/>
    <line x1="20" y1="40" x2="31" y2="45" stroke="url(#logoGradient)" stroke-width="3"/>
    
    <!-- Bottom Left - Palette -->
    <circle cx="5" cy="45" r="6" fill="url(#logoGradient)"/>
    <circle cx="3" cy="43" r="1.5" fill="#ffffff"/>
    <circle cx="7" cy="43" r="1.5" fill="#f59e0b"/>
    <circle cx="5" cy="47" r="1.5" fill="#ea580c"/>
    <line x1="20" y1="40" x2="11" y2="45" stroke="url(#logoGradient)" stroke-width="3"/>
  </g>
  
  <!-- CreatorHub Text -->
  <text x="120" y="45" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="url(#logoGradient)" filter="url(#dropShadow)">CREATORHUB</text>
  
  <!-- Norge Subtitle -->
  <text x="120" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="normal" 
        fill="#d97706" opacity="0.8">NORGE</text>
        
  <!-- Professional Creative Platform Tagline -->
  <text x="120" y="85" font-family="Arial, sans-serif" font-size="10" font-weight="normal" 
        fill="#92400e" opacity="0.7">Profesjonell Kreativ Plattform</text>
</svg>