<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5e6d3"/>
  
  <!-- Soft gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d4b8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lightGrad" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#fff9e6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f5e6d3;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  <rect width="400" height="300" fill="url(#lightGrad)"/>
  
  <!-- Subject silhouette (bride/groom) -->
  <ellipse cx="200" cy="180" rx="50" ry="80" fill="#d4c4b0" opacity="0.4"/>
  <circle cx="200" cy="120" r="35" fill="#d4c4b0" opacity="0.5"/>
  
  <!-- Key light (softbox) - left -->
  <ellipse cx="120" cy="80" rx="40" ry="25" fill="#fff9e6" opacity="0.7"/>
  <rect x="100" y="75" width="40" height="10" rx="2" fill="#fff" opacity="0.8"/>
  
  <!-- Fill light (stripbox) - right -->
  <rect x="240" y="100" width="20" height="60" rx="2" fill="#fff9e6" opacity="0.5"/>
  <rect x="238" y="98" width="24" height="4" rx="1" fill="#fff" opacity="0.6"/>
  
  <!-- Backdrop light -->
  <ellipse cx="200" cy="250" rx="80" ry="20" fill="#fff9e6" opacity="0.3"/>
  
  <!-- Camera position indicator -->
  <circle cx="200" cy="280" r="8" fill="#8b7355" opacity="0.6"/>
  <line x1="200" y1="280" x2="200" y2="200" stroke="#8b7355" stroke-width="2" opacity="0.4" stroke-dasharray="4,4"/>
  
  <!-- Romantic atmosphere elements -->
  <circle cx="80" cy="60" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="320" cy="50" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="80" r="2.5" fill="#fff" opacity="0.4"/>
</svg>

